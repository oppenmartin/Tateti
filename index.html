<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ta-Te-Ti de las Chicas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>Ta-Te-Ti</h1>
    <p class="subtitle">Elegí el modo y empezá a jugar con Delfi y Cata.</p>

    <section class="setup">
      <div class="player-config">
        <h2>Jugadora 1</h2>
        <label for="name1">Nombre</label>
        <input id="name1" type="text" placeholder="Nombre de tu hija" maxlength="20" value="Delfi">
        <div class="photo-upload" aria-hidden="true">
          <label for="photo1">Foto</label>
          <input id="photo1" type="file" accept="image/*">
        </div>
      </div>

      <div class="player-config">
        <h2>Jugadora 2</h2>
        <label for="name2">Nombre</label>
        <input id="name2" type="text" placeholder="Nombre de tu hija" maxlength="20" value="Cata">
        <div class="photo-upload" aria-hidden="true">
          <label for="photo2">Foto</label>
          <input id="photo2" type="file" accept="image/*">
        </div>
      </div>
    </section>

    <section class="controls">
      <label for="modeSelect" class="mode-label">Modo</label>
      <select id="modeSelect">
        <option value="normal">Normal</option>
        <option value="reverse">Al revés (gana quien no hace ta-te-ti)</option>
        <option value="complex">Complejo (cada turno podés usar cualquier cara)</option>
      </select>
      <button id="startBtn">Empezar partida</button>
      <button id="rematchBtn" class="ghost-btn" disabled>Jugar otra</button>
      <button id="resetBtn">Reiniciar</button>
    </section>

    <section class="scoreboard" aria-label="Marcador">
      <p class="score-item"><span id="scoreNameX">Delfi</span>: <strong id="scoreX">0</strong></p>
      <p class="score-item"><span id="scoreNameO">Cata</span>: <strong id="scoreO">0</strong></p>
      <p class="score-item">Empates: <strong id="scoreDraws">0</strong></p>
      <button id="clearScoreBtn" class="clear-score-btn" type="button">Borrar marcador</button>
    </section>

    <section id="facePicker" class="face-picker hidden" aria-label="Elegir cara para el turno">
      <p class="face-picker-title">Elegí qué cara poner en este turno:</p>
      <div class="face-options">
        <button id="faceChoice0" type="button" class="face-choice"></button>
        <button id="faceChoice1" type="button" class="face-choice"></button>
      </div>
    </section>

    <p id="status" class="status">Tocá "Empezar partida" para jugar.</p>

    <section class="board-wrap">
      <section id="board" class="board" aria-label="Tablero de Ta-Te-Ti"></section>
      <div id="winnerOverlay" class="winner-overlay hidden" aria-live="polite">
        <img id="winnerFace" class="winner-face" alt="Ganadora">
        <p id="winnerText" class="winner-text"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
